<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, -apple-system, sans-serif">
  <rect width="900" height="500" fill="white"/>
  <text x="40" y="50" font-size="22" font-weight="700" fill="#0f172a">Q3 Roadmap</text>
  <text x="40" y="75" font-size="13" fill="#64748b">Theme: less features, more polish</text>
  <line x1="40" y1="120" x2="860" y2="120" stroke="#cbd5e1" stroke-width="2"/>
  <text x="170" y="105" font-size="12" font-weight="600" fill="#475569" text-anchor="middle">Month 1</text>
  <text x="450" y="105" font-size="12" font-weight="600" fill="#475569" text-anchor="middle">Month 2</text>
  <text x="730" y="105" font-size="12" font-weight="600" fill="#475569" text-anchor="middle">Month 3</text>
  <circle cx="170" cy="120" r="6" fill="#3b82f6"/>
  <circle cx="450" cy="120" r="6" fill="#3b82f6"/>
  <circle cx="730" cy="120" r="6" fill="#3b82f6"/>
  <rect x="60" y="160" width="220" height="50" fill="#dbeafe" stroke="#3b82f6" rx="6"/>
  <text x="170" y="190" font-size="13" font-weight="600" fill="#1e40af" text-anchor="middle">Design system v2</text>
  <rect x="60" y="220" width="220" height="50" fill="#fef3c7" stroke="#f59e0b" rx="6"/>
  <text x="170" y="250" font-size="13" font-weight="600" fill="#92400e" text-anchor="middle">Onboarding overhaul</text>
  <rect x="340" y="160" width="220" height="50" fill="#dcfce7" stroke="#10b981" rx="6"/>
  <text x="450" y="190" font-size="13" font-weight="600" fill="#14532d" text-anchor="middle">Performance: p95 &lt; 200ms</text>
  <rect x="340" y="220" width="220" height="50" fill="#ede9fe" stroke="#8b5cf6" rx="6"/>
  <text x="450" y="250" font-size="13" font-weight="600" fill="#5b21b6" text-anchor="middle">Audit log feature</text>
  <rect x="620" y="160" width="220" height="50" fill="#fce7f3" stroke="#ec4899" rx="6"/>
