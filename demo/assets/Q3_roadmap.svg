  <text x="730" y="250" font-size="13" font-weight="600" fill="#155e75" text-anchor="middle">SOC2 readiness</text>
  <text x="40" y="320" font-size="13" font-weight="600" fill="#64748b">METRICS WE'LL WATCH</text>
  <text x="40" y="345" font-size="12" fill="#0f172a">• Activation rate (new users week 1)</text>
