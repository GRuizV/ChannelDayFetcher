<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, -apple-system, sans-serif">
  <rect width="900" height="500" fill="#fafafa"/>
  <text x="40" y="50" font-size="20" font-weight="700" fill="#0f172a">Deploy Diagram</text>
  <rect x="40" y="100" width="160" height="80" fill="white" stroke="#3b82f6" stroke-width="2" rx="6"/>
  <text x="120" y="135" font-size="14" font-weight="600" fill="#0f172a" text-anchor="middle">GitHub Repo</text>
  <text x="120" y="155" font-size="11" fill="#64748b" text-anchor="middle">main branch</text>
  <path d="M 200 140 L 270 140" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="270" y="100" width="160" height="80" fill="white" stroke="#10b981" stroke-width="2" rx="6"/>
  <text x="350" y="135" font-size="14" font-weight="600" fill="#0f172a" text-anchor="middle">CI · GitHub Actions</text>
  <text x="350" y="155" font-size="11" fill="#64748b" text-anchor="middle">lint · test · build</text>
  <path d="M 430 140 L 500 140" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="500" y="100" width="160" height="80" fill="white" stroke="#f59e0b" stroke-width="2" rx="6"/>
  <text x="580" y="135" font-size="14" font-weight="600" fill="#0f172a" text-anchor="middle">Container Registry</text>
  <text x="580" y="155" font-size="11" fill="#64748b" text-anchor="middle">tagged images</text>
  <path d="M 660 140 L 730 140" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="730" y="100" width="130" height="80" fill="white" stroke="#8b5cf6" stroke-width="2" rx="6"/>
  <text x="795" y="135" font-size="14" font-weight="600" fill="#0f172a" text-anchor="middle">Kubernetes</text>
  <text x="795" y="155" font-size="11" fill="#64748b" text-anchor="middle">rolling deploy</text>
  <path d="M 795 180 L 795 250" stroke="#64748b" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="700" y="250" width="190" height="60" fill="white" stroke="#0ea5e9" stroke-width="2" rx="6"/>
  <text x="795" y="285" font-size="14" font-weight="600" fill="#0f172a" text-anchor="middle">Production</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 Z" fill="#64748b"/>
    </marker>
  </defs>
  <text x="40" y="470" font-size="11" fill="#94a3b8">Demo asset for portfolio</text>
</svg>
