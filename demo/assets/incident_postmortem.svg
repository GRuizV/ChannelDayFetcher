<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" font-family="system-ui, -apple-system, sans-serif">
  <rect width="800" height="600" fill="white"/>
  <rect x="0" y="0" width="800" height="60" fill="#fef2f2"/>
  <text x="40" y="38" font-size="20" font-weight="700" fill="#991b1b">INC-2026-04-23 · Postmortem</text>
  <text x="40" y="100" font-size="13" font-weight="600" fill="#64748b">SUMMARY</text>
  <text x="40" y="125" font-size="14" fill="#0f172a">Autoscaling stalled for 42 minutes after a config rename.</text>
  <text x="40" y="170" font-size="13" font-weight="600" fill="#64748b">TIMELINE</text>
  <text x="40" y="195" font-size="13" fill="#0f172a">14:02  Deploy lands</text>
  <text x="40" y="215" font-size="13" fill="#0f172a">14:11  Alerts fire (p95 latency)</text>
  <text x="40" y="235" font-size="13" fill="#0f172a">14:18  Oncall pages</text>
  <text x="40" y="255" font-size="13" fill="#0f172a">14:44  Config reverted</text>
  <text x="40" y="275" font-size="13" fill="#0f172a">14:46  Recovery confirmed</text>
  <text x="40" y="320" font-size="13" font-weight="600" fill="#64748b">ROOT CAUSE</text>
  <text x="40" y="345" font-size="13" fill="#0f172a">SCALE_MIN renamed without updating the deployment template.</text>
  <text x="40" y="365" font-size="13" fill="#0f172a">Default of 0 took effect → no minimum capacity.</text>
  <text x="40" y="410" font-size="13" font-weight="600" fill="#64748b">ACTION ITEMS</text>
  <text x="40" y="435" font-size="13" fill="#0f172a">1. Lint rule for required config keys (owner: Riley)</text>
  <text x="40" y="455" font-size="13" fill="#0f172a">2. Min-capacity floor in autoscaler (owner: Alex)</text>
  <text x="40" y="555" font-size="11" fill="#94a3b8">Demo asset for portfolio</text>
</svg>
