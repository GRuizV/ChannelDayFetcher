<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="system-ui, -apple-system, sans-serif">
  <rect width="900" height="500" fill="#fafafa"/>
  <text x="40" y="50" font-size="20" font-weight="700" fill="#0f172a">Ingestion Pipeline</text>
  <rect x="40" y="100" width="140" height="60" fill="white" stroke="#3b82f6" stroke-width="2" rx="6"/>
  <text x="110" y="130" font-size="13" font-weight="600" fill="#0f172a" text-anchor="middle">Source APIs</text>
  <text x="110" y="148" font-size="10" fill="#64748b" text-anchor="middle">webhooks · polls</text>
  <path d="M 180 130 L 250 130" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="250" y="100" width="160" height="60" fill="white" stroke="#10b981" stroke-width="2" rx="6"/>
  <text x="330" y="130" font-size="13" font-weight="600" fill="#0f172a" text-anchor="middle">Normalize</text>
  <text x="330" y="148" font-size="10" fill="#64748b" text-anchor="middle">async workers</text>
  <path d="M 410 130 L 480 130" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="480" y="100" width="160" height="60" fill="white" stroke="#f59e0b" stroke-width="2" rx="6"/>
  <text x="560" y="130" font-size="13" font-weight="600" fill="#0f172a" text-anchor="middle">Validate &amp; Enrich</text>
  <text x="560" y="148" font-size="10" fill="#64748b" text-anchor="middle">idempotent</text>
  <path d="M 640 130 L 710 130" stroke="#64748b" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="710" y="100" width="150" height="60" fill="white" stroke="#8b5cf6" stroke-width="2" rx="6"/>
  <text x="785" y="130" font-size="13" font-weight="600" fill="#0f172a" text-anchor="middle">Storage</text>
  <text x="785" y="148" font-size="10" fill="#64748b" text-anchor="middle">Postgres + S3</text>
  <path d="M 330 160 L 330 230" stroke="#ef4444" stroke-width="2" stroke-dasharray="5 3" marker-end="url(#arr-red)"/>
  <path d="M 560 160 L 560 230" stroke="#ef4444" stroke-width="2" stroke-dasharray="5 3" marker-end="url(#arr-red)"/>
  <rect x="280" y="230" width="360" height="50" fill="#fef2f2" stroke="#ef4444" stroke-width="2" rx="6"/>
  <text x="460" y="260" font-size="13" font-weight="600" fill="#991b1b" text-anchor="middle">Dead Letter Queue · manual replay via CLI</text>
  <text x="40" y="350" font-size="13" font-weight="600" fill="#64748b">PROPERTIES</text>
  <text x="40" y="375" font-size="12" fill="#0f172a">• Backpressure between stages (bounded queues)</text>
  <text x="40" y="395" font-size="12" fill="#0f172a">• Idempotent retries with exponential backoff</text>
  <text x="40" y="415" font-size="12" fill="#0f172a">• Failures isolated to single records, not the whole batch</text>
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 Z" fill="#64748b"/>
    </marker>
    <marker id="arr-red" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 Z" fill="#ef4444"/>
    </marker>
  </defs>
  <text x="40" y="470" font-size="11" fill="#94a3b8">Demo asset for portfolio</text>
</svg>
